name: ci

on:
  push:
    branches: [main, rebind]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -o cursor-rebind ./cmd/cursor-rebind
