# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: cursor-rebind

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: cursor-rebind
    main: ./cmd/cursor-rebind
    binary: cursor-rebind
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/Interittus13/cursor-rebind/internal/cli.Version={{.Version}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

snapshot:
  version_template: "{{ .Version }}-next"

release:
  draft: false
  prerelease: auto
  name_template: "cursor-rebind {{.Tag}}"
